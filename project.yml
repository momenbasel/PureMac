name: PureMac
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.0.0
options:
  bundleIdPrefix: com.puremac
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.4"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: "NO"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: "Automatic"
    DEVELOPMENT_TEAM: "H3WXHVTP97"
    CODE_SIGN_ENTITLEMENTS: ""
    INFOPLIST_FILE: "PureMac/Info.plist"
    PRODUCT_BUNDLE_IDENTIFIER: "com.puremac.app"
    MARKETING_VERSION: "2.8.5"
    CURRENT_PROJECT_VERSION: "20"
    GENERATE_INFOPLIST_FILE: "NO"
    ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
    COMBINE_HIDPI_IMAGES: "YES"

targets:
  PureMac:
    type: application
    platform: macOS
    sources:
      - path: PureMac
        excludes:
          - Info.plist
          - PureMac.entitlements
      - Shared
      - path: PureMacPrivilegedHelper/com.puremac.privileged-cleaning.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchDaemons
    dependencies:
      - package: Sparkle
        product: Sparkle
      - sdk: ServiceManagement.framework
      - sdk: Security.framework
      - target: PureMacPrivilegedHelper
        embed: true
        link: false
        codeSign: true
        copy:
          destination: wrapper
          subpath: Contents/Library/LaunchServices
    settings:
      base:
        PRODUCT_NAME: PureMac
        SWIFT_EMIT_LOC_STRINGS: "YES"
        CODE_SIGN_ENTITLEMENTS: "PureMac/PureMac.entitlements"
        ENABLE_HARDENED_RUNTIME: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

  PureMacPrivilegedHelper:
    type: tool
    platform: macOS
    sources:
      - path: PureMacPrivilegedHelper
        excludes:
          - "*.plist"
      - Shared
    dependencies:
      - sdk: Security.framework
    settings:
      base:
        PRODUCT_NAME: com.puremac.privileged-helper
        PRODUCT_BUNDLE_IDENTIFIER: com.puremac.privileged-helper
        CODE_SIGN_ENTITLEMENTS: ""
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        SKIP_INSTALL: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"

  PureMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - PureMacTests
    dependencies:
      - target: PureMac
    settings:
      base:
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGNING_REQUIRED: "NO"

schemes:
  PureMac:
    build:
      targets:
        PureMac: all
        PureMacTests: [test]
    test:
      targets:
        - name: PureMacTests
